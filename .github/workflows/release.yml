name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed so git describe/git log can see full history and tags

      - name: Create release archive
        run: |
          mkdir -p ../atmosphera-release
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='nix' \
            --exclude='flake.nix' \
            --exclude='flake.lock' \
            --exclude='result*' \
            ./ ../atmosphera-release/
          cd ..
          tar -czf atmosphera-${{ github.ref_name }}.tar.gz atmosphera-release/
          cp atmosphera-${{ github.ref_name }}.tar.gz atmosphera-latest.tar.gz
          mv *.tar.gz ${{ github.workspace }}/

      - name: Generate release notes
        run: |
          set -euo pipefail
          TAG_BODY=$(git tag -l --format='%(contents:body)' "${GITHUB_REF_NAME}")
          if [ -n "${TAG_BODY}" ]; then
            echo "${TAG_BODY}" > release_notes.md
          else
            PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || true)
            if [ -z "${PREV_TAG:-}" ]; then
              PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n1 || true)
            fi
            if [ -z "${PREV_TAG:-}" ]; then
              RANGE="$(git rev-list --max-parents=0 HEAD)..${GITHUB_REF_NAME}"
              SINCE_LABEL="initial"
            else
              RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
              SINCE_LABEL="${PREV_TAG}"
            fi
            echo "# Release ${GITHUB_REF_NAME}" > release_notes.md
            echo "" >> release_notes.md
            echo "## Changes since ${SINCE_LABEL}" >> release_notes.md
            echo "" >> release_notes.md
            git log --max-count=200 ${RANGE} --pretty=format:"- %s (%an)" >> release_notes.md
            echo "" >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            atmosphera-${{ github.ref_name }}.tar.gz
            atmosphera-latest.tar.gz
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
