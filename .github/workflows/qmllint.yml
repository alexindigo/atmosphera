name: QML Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt6 declarative tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qt6-declarative-dev-tools 2>/dev/null || \
            sudo apt-get install -y -qq qt6-tools-dev-tools 2>/dev/null || true

      - name: Find qmllint
        id: find-qmllint
        run: |
          for p in /usr/lib/qt6/bin/qmllint /usr/lib64/qt6/bin/qmllint /usr/bin/qmllint; do
            if [ -x "$p" ]; then echo "qmllint=$p" >> $GITHUB_OUTPUT; break; fi
          done

      - name: Check qmllint version
        if: steps.find-qmllint.outputs.qmllint != ''
        id: version-check
        run: |
          VERSION=$(${{ steps.find-qmllint.outputs.qmllint }} --version 2>&1 | head -1)
          echo "qmllint version: $VERSION"
          if echo "$VERSION" | grep -q 'qmllint [6-9]\.' && echo "$VERSION" | grep -v 'qmllint 6\.[0-5]\.'; then
            echo "supported=true" >> $GITHUB_OUTPUT
          else
            echo "supported=false" >> $GITHUB_OUTPUT
            echo "qmllint too old for .qmllint.ini support — skipping lint (requires Qt 6.6+)"
          fi

      - name: Run qmllint
        if: steps.version-check.outputs.supported == 'true'
        run: |
          chmod +x Scripts/dev/qmllint.sh
          Scripts/dev/qmllint.sh
