name: Mirror to Codeberg

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  delete:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + all branches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all remote branches
        run: git fetch --all --prune --no-tags

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.CODEBERG_SSH_KEY }}

      - name: Add Codeberg to known hosts
        run: |
          echo 'codeberg.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIVIC02vnjFyL+I4RHfvIGNtOgJMe769VTF1VR4EB3ZB' >> ~/.ssh/known_hosts
          echo 'codeberg.org ssh-rsa ' >> ~/.ssh/known_hosts

      - name: Push mirror to Codeberg
        run: |
          git remote add codeberg git@codeberg.org:atmosphera/atmosphera.git
          git push codeberg --prune '+refs/heads/*:refs/heads/*'
          git push codeberg --prune '+refs/tags/*:refs/tags/*'