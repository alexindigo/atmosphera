name: Mirror to Codeberg

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  delete:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + all branches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all remote branches and tags
        run: git fetch --all --tags --prune

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CODEBERG_SSH_KEY }}

      - name: Add Codeberg to known hosts
        run: ssh-keyscan -t ed25519,rsa codeberg.org >> ~/.ssh/known_hosts

      - name: Push mirror to Codeberg
        run: |
          git remote add codeberg git@codeberg.org:atmosphera/atmosphera.git
          git push codeberg --prune '+refs/heads/*:refs/heads/*'
          git push codeberg --prune '+refs/tags/*:refs/tags/*'