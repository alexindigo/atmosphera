# mc skin — generated from Atmosphera theme by TemplateProcessor.
# Do not edit — regenerated on every Atmosphera theme change.
# Change mc's ~/.config/mc/ini to `skin=atmosphera` to activate.

[skin]
    description = Atmosphera (dynamic — tracks current palette)
    truecolors = true

[Lines]
    horiz = ─
    vert = │
    lefttop = ┌
    righttop = ┐
    leftbottom = └
    rightbottom = ┘
    topmiddle = ┬
    bottommiddle = ┴
    leftmiddle = ├
    rightmiddle = ┤
    cross = ┼
    dhoriz = ═
    dvert = ║
    dlefttop = ╔
    drighttop = ╗
    dleftbottom = ╚
    drightbottom = ╝
    dtopmiddle = ╤
    dbottommiddle = ╧
    dleftmiddle = ╟
    drightmiddle = ╢

[aliases]
    BgBase       = {{colors.surface.default.hex}}
    BgVariant    = {{colors.surface_variant.default.hex}}
    BgContainer  = {{colors.surface_container.default.hex}}
    FgMain       = {{colors.on_surface.default.hex}}
    FgMuted      = {{colors.on_surface_variant.default.hex}}
    Accent       = {{colors.primary.default.hex}}
    OnAccent     = {{colors.on_primary.default.hex}}
    Accent2      = {{colors.secondary.default.hex}}
    OnAccent2    = {{colors.on_secondary.default.hex}}
    Accent3      = {{colors.tertiary.default.hex}}
    OnAccent3    = {{colors.on_tertiary.default.hex}}
    Error        = {{colors.error.default.hex}}
    OnError      = {{colors.on_error.default.hex}}
    Outline      = {{colors.outline.default.hex}}
    Dim          = {{colors.primary_fixed_dim.default.hex}}
    Dim2         = {{colors.secondary_fixed_dim.default.hex}}

[core]
    _default_        = FgMain;BgBase
    selected         = OnAccent;Accent
    marked           = Accent3;;bold
    markselect       = OnAccent3;Accent3;bold
    gauge            = OnAccent;Accent
    input            = FgMain;BgVariant
    inputunchanged   = FgMuted;BgVariant
    inputmark        = OnAccent;Accent
    disabled         = FgMuted;BgBase
    reverse          = BgBase;FgMain
    commandlinemark  = OnAccent;Accent
    header           = Accent2;;bold
    shadow           = FgMuted;BgVariant

[dialog]
    _default_        = FgMain;BgContainer
    dfocus           = OnAccent;Accent
    dhotnormal       = Accent2;;underline
    dhotfocus        = OnAccent;Accent;underline
    dtitle           = Accent;;bold

[error]
    _default_        = OnError;Error
    errdfocus        = OnError;Error
    errdhotnormal    = ;;underline
    errdhotfocus     = ;;underline
    errdtitle        = ;;bold

[filehighlight]
    directory        = Accent;;bold
    executable       = Accent3
    symlink          = Dim2
    hardlink         = FgMuted
    stalelink        = Error
    device           = Accent2
    special          = Dim
    core             = Error
    temp             = FgMuted
    archive          = Dim
    doc              = Accent2
    source           = Accent3
    media            = Dim2
    graph            = Accent
    database         = Dim

[menu]
    _default_        = FgMain;BgVariant
    menusel          = OnAccent;Accent
    menuhot          = Accent;;underline
    menuhotsel       = OnAccent;Accent;underline
    menuinactive     = FgMuted;BgVariant

[popupmenu]
    _default_        = FgMain;BgContainer
    menusel          = OnAccent;Accent
    menutitle        = Accent;;bold

[buttonbar]
    hotkey           = FgMain;BgBase
    button           = OnAccent2;Accent2

[statusbar]
    _default_        = FgMuted;BgVariant

[help]
    _default_        = FgMain;BgContainer
    helpbold         = Accent;;bold
    helpitalic       = Accent2;;italic
    helplink         = Accent3;;underline
    helpslink        = OnAccent;Accent

[editor]
    editbold         = Accent;;bold
    editmarked       = OnAccent;Accent
    editwhitespace   = FgMuted
    editnonprintable = Error
    editlinestate    = FgMuted;BgVariant
    bookmark         = OnAccent3;Accent3
    bookmarkfound    = OnAccent;Accent
    editrightmargin  = Outline
    editbg           = FgMain;BgBase
    editframe        = Outline
    editframeactive  = Accent
    editframedrag    = Accent3

[viewer]
    viewbold         = Accent;;bold
    viewunderline    = Accent2;;underline
    viewselected     = OnAccent3;Accent3

[widget-panel]
    sort-up-char        = ▴
    sort-down-char      = ▾
    hiddenfiles-show-char = •
