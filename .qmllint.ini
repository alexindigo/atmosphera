# qmllint configuration for Atmosphera.
# Custom modules (qs.*, Quickshell.*) can't be fully resolved — relax
# warnings that fire spuriously on these.

[General]
DisableDefaultLintAndFormatInfo=false

[Warnings]
# -- Relaxed (noise from qs.* / Quickshell.* custom modules) --
# Unqualified property access (e.g. Logger.i(...) without full path).
# Fires 100+ times per file on custom-module calls.
unqualified-id=disable

# Import errors for custom modules that lack qmltypes.
import=info
unresolved-type=info

# -- Kept strict (real bugs) --
missing-property=error
signal-handler-parameters=warning
missing-type=error
name=warning
quick.layout-positioning=warning
unresolved-alias=error
