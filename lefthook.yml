pre-commit:
  jobs:
    - name: format qml
      run: cd "$(git rev-parse --show-toplevel)" && ./Scripts/dev/qmlfmt.sh && git update-index --again
    - name: build settings search index
      run: cd "$(git rev-parse --show-toplevel)" && python3 Scripts/dev/build-settings-search-index.py && git add Assets/settings-search-index.json

pre-push:
  jobs:
    - name: verify remote is trusted
      run: |
        url=$(git remote get-url "$1" 2>/dev/null || echo "unknown")
        case "$url" in
          *github.com:alexindigo/atmosphera*|*aur-atmosphera*) ;;
          *)
            echo "ERROR: Push to untrusted remote '$1' ($url)"
            exit 1
            ;;
        esac
    - name: verify signed commits and tags
      run: |
        set -euo pipefail
        failures=0
        while read local_ref local_sha remote_ref remote_sha; do
          [ -z "$local_ref" ] && continue
          if echo "$local_ref" | grep -q '^refs/tags/'; then
            sig=$(git cat-file -p "$local_sha" 2>/dev/null | grep -co 'gpgsig\|BEGIN SSH SIGNATURE' || true)
            if [ "$sig" = "0" ]; then
              echo "ERROR: Tag $local_ref ($local_sha) is not signed"
              failures=$((failures + 1))
            fi
          elif echo "$local_ref" | grep -q '^refs/heads/'; then
            if [ "$remote_sha" = "0000000000000000000000000000000000000000" ]; then
              range="$local_sha"
            else
              range="${remote_sha}..${local_sha}"
            fi
            for commit in $(git rev-list "$range" 2>/dev/null); do
              if git merge-base --is-ancestor "2b40ea68a" "$commit" 2>/dev/null; then
                sig=$(git cat-file -p "$commit" 2>/dev/null | grep -co 'gpgsig\|BEGIN SSH SIGNATURE' || true)
                if [ "$sig" = "0" ]; then
                  echo "ERROR: Commit $commit is not signed"
                  failures=$((failures + 1))
                fi
              fi
            done
          fi
        done
        if [ "$failures" -gt 0 ]; then
          echo "ERROR: $failures ref(s) rejected — all commits and tags must be signed"
          exit 1
        fi
